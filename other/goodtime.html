<!doctype HTML>
<style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 25%;
    }
    h1 {
        font-size: 500%;
        margin-bottom:-2px;
    }

    h4 {
        font-size:150%;
    }
</style>
<html>
    <head>
        <title>Duckian Timekeeping</title>
    </head>
    <body>
        <h1 id="day"></h1>
        <h4 id="monthyear"></h4>
    </body>
</html>

<script>
    function calculateTime() {
        var date = new Date;
        var epoch = (date.getTime() / 1000) - 1640995200;
        var good = epoch / 86400;

        document.getElementById("day").innerHTML = good.toString().substr(0,7);
        document.getElementById("monthyear").innerHTML = "Month: " + Math.floor(good / 10) + " // Years: " + Math.floor(good / 100);
    }

    calculateTime();
    setInterval(calculateTime, 1000);
</script>
